name: easy_icons
description: "A Flutter package icons."
version: 0.0.5
repository: https://github.com/farhanfadila1717/easy-icons
maintainer: Farhan Fadila (@farhanfadila1717)

environment:
  sdk: ^3.12.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: IonIcons
      fonts:
        - asset: fonts/IonIcons.ttf
    - family: TablerIcons
      fonts:
        - asset: fonts/TablerIcons.ttf
